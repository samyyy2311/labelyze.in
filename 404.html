<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found · Labelyze</title>
<meta name="description" content="The page you are looking for does not exist.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#08090C">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#08090C;--s1:#0f1116;--b1:rgba(255,255,255,0.05);--a:#5BB8FF;--w1:#F4F1EB;--w2:rgba(244,241,235,0.55);--w3:rgba(244,241,235,0.3);--card-border:rgba(255,255,255,0.1);color-scheme:dark;}
[data-theme="light"]{--bg:#F1EDE6;--s1:#F3F6FA;--b1:rgba(26,35,56,0.10);--a:#5BB8FF;--w1:#121923;--w2:rgba(18,25,35,0.62);--w3:rgba(18,25,35,0.42);--card-border:rgba(26,35,56,0.10);color-scheme:light;}
:root{--blur:blur(48px);--fd:'Montserrat',sans-serif;--fb:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--w1);-webkit-font-smoothing:antialiased;line-height:1.65;min-height:100vh;display:flex;flex-direction:column}
.subnav{display:flex;align-items:center;justify-content:space-between;padding:18px 52px;border-bottom:.5px solid var(--b1);background:var(--bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.logo{font-family:var(--fd);font-weight:900;font-size:17px;letter-spacing:-0.5px;color:var(--w1);text-decoration:none}
.logo span{color:var(--a)}
.tt{width:42px;height:24px;border-radius:100px;background:rgba(255,255,255,0.07);border:1px solid var(--card-border);cursor:pointer;position:relative;flex-shrink:0;overflow:hidden}
[data-theme="light"] .tt{background:rgba(26,35,56,0.06);border-color:var(--b1)}
.tt-thumb{position:absolute;top:4px;left:4px;width:14px;height:14px;border-radius:50%;background:var(--w1);transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:2}
[data-theme="light"] .tt-thumb{transform:translateX(18px)}
.tt-icon{position:absolute;top:50%;transform:translateY(-50%);pointer-events:none;right:5px;z-index:1;display:flex;align-items:center;color:var(--w3)}
[data-theme="light"] .tt-icon{right:auto;left:5px}
.tt-icon svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.5}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px}
.err-code{font-family:var(--fd);font-size:clamp(80px,16vw,160px);font-weight:900;letter-spacing:-6px;line-height:1;color:var(--b1);margin-bottom:0;user-select:none;background:linear-gradient(135deg,var(--w3) 0%,transparent 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.err-title{font-family:var(--fd);font-size:clamp(22px,3vw,32px);font-weight:900;letter-spacing:-1px;color:var(--w1);margin-bottom:12px}
.err-sub{font-size:15px;color:var(--w2);max-width:380px;line-height:1.72;margin-bottom:40px}
.btn-home{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 24px;background:var(--a);border:none;border-radius:100px;font-family:var(--fd);font-size:13px;font-weight:700;color:#08090C;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .2s}
.btn-home:hover{opacity:.86;transform:translateY(-1px)}
.err-links{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.err-links a{font-size:13px;color:var(--w3);text-decoration:none;transition:color .2s}
.err-links a:hover{color:var(--a)}
.site-footer{border-top:.5px solid var(--b1);padding:22px 52px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sf-copy{font-size:11px;color:var(--w3)}
.sf-links{display:flex;gap:16px}
.sf-links a{font-size:12px;color:var(--w3);text-decoration:none;transition:color .2s}
.sf-links a:hover{color:var(--a)}
@media(max-width:600px){.subnav{padding:14px 20px}.site-footer{padding:18px 20px;flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<nav class="subnav">
  <a href="/" class="logo">Label<span>yze</span></a>
  <button class="tt" id="themeToggle" aria-label="Toggle theme">
    <div class="tt-thumb"></div>
    <span class="tt-icon" id="ttIconDark"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
    <span class="tt-icon" id="ttIconLight" style="display:none"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
  </button>
</nav>
<main class="main">
  <div class="err-code">404</div>
  <h1 class="err-title">Page not found</h1>
  <p class="err-sub">The page you are looking for does not exist, may have moved, or the URL may be incorrect.</p>
  <a href="/" class="btn-home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Go to homepage
  </a>
  <div class="err-links">
    <a href="/support">Support</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/changelog">Changelog</a>
    <a href="mailto:hello@labelyze.in">Contact</a>
  </div>
</main>
<footer class="site-footer">
  <span class="sf-copy">&copy; <span id="yr"></span> CaffeineLabs &middot; India</span>
  <div class="sf-links">
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </div>
</footer>
<script>
(function(){
  var h=document.documentElement,t=localStorage.getItem('lyz_theme')||'dark';
  h.setAttribute('data-theme',t);
  function upd(t){var d=document.getElementById('ttIconDark'),l=document.getElementById('ttIconLight');if(t==='dark'){d.style.display='flex';l.style.display='none';}else{d.style.display='none';l.style.display='flex';}}
  upd(t);
  document.getElementById('themeToggle').addEventListener('click',function(){var next=h.getAttribute('data-theme')==='light'?'dark':'light';h.setAttribute('data-theme',next);upd(next);localStorage.setItem('lyz_theme',next);});
  document.getElementById('yr').textContent=new Date().getFullYear();
})();
</script>
</body>
</html>
